name: Build and Analyze

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Build with Maven and Run Tests
        run: mvn clean verify

      - name: Check JaCoCo report
        run: |
          echo "=== JaCoCo report check ==="
          ls -la target/site/jacoco/ && echo "SUCCESS: jacoco dir found" || echo "ERROR: jacoco dir NOT found"
          ls -la target/site/jacoco/jacoco.xml && echo "SUCCESS: jacoco.xml found" || echo "ERROR: jacoco.xml NOT found"

      - name: Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn sonar:sonar
          -Dsonar.projectKey=Nekitoso-o_Javalabs
          -Dsonar.organization=nekitoso-o
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml