server {
    listen 80;
    server_name _;

    # Корень для статических файлов
    root /usr/share/nginx/html;
    index index.html;

    # ── Кэширование статических ресурсов ──────────────────────────
    # JS/CSS/изображения кэшируются на год — у них хэш в имени файла
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Проксирование API-запросов на бэкенд ──────────────────────
    # Все запросы /api/* перенаправляются на бэкенд-сервис
    location /api/ {
        # VITE_API_URL подставляется через переменную окружения на Render
        # Здесь указываем имя сервиса из docker-compose или URL Render
        proxy_pass ${BACKEND_URL};

        proxy_http_version 1.1;

        # Необходимые заголовки для корректной передачи запросов
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для долгих запросов (например, загрузка файлов)
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Увеличиваем лимит для загрузки изображений (20MB)
        client_max_body_size 25m;
    }

    # ── SPA Fallback ───────────────────────────────────────────────
    # Все остальные запросы отдаём index.html
    # Это нужно для React Router — чтобы /catalog, /comics/1 и т.д.
    # обрабатывались клиентским роутером, а не Nginx
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Сжатие ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}